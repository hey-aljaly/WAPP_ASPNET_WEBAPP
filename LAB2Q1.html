<!DOCTYPE html>
<html>
<head>
    <title>Untitled Page</title>
    <style type="text/css">
        
        #wrapper {
            width: 900px;
            margin: 0 auto;
            overflow: hidden;
        }
        #header {
            height: 100px;
            width: 900px;
            background-color: #FF99CC;
        }
        #menu {
            width: 900px;
            height: 50px;
            background-color: #CCFF99;
        }
        #content1 {
            width: 450px;
            float: left;
            height: 450px;
            background-color: #FFCC66;
            border-radius: 25px;
            margin-right: 0;
        }
        #content2 {
            width: 450px;
            float: right;
            height: 450px;
            background-color: #CC99FF;
            border-radius: 25px;
        }


        h1 { color: #000099; font-family: Arial; background-color: #00cc99; }
        h2 { color: #000099; font-family: Arial; background-color: #66ff99; }
        h3 { color: #000099; font-family: Arial; background-color: #ffff99; }
        h4 { color: #000099; font-family: Arial; background-color: #ffccff; }
        h5 { color: #000099; font-family: Arial; background-color: #99ccff; }
        h6 { color: #000099; font-family: Arial; background-color: #66ffff; }
    </style>
</head>
<body>

<h1>Monday</h1>
<h2>Tuesday</h2>
<h3>Webnesday</h3>
<h4>Thursday</h4>
<h5>Friday</h5>
<h6>Saturday</h6>
</body>
</html>
