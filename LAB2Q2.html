<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout Demo</title>
    <style>
        #wrapper {
            width: 900px;
            margin: 0 auto;
            overflow: hidden;
        }
        #header {
            height: 100px;
            width: 900px;
            background-color: #FF99CC;
            text-align: center;
            line-height: 100px;
            margin: 12px ;
            border: 2px solid #000000;
        }
        #menu {
            width: 900px;
            height: 50px;
            background-color: #CCFF99;
            text-align: center;
            line-height: 50px;
            margin: 12px ;
            border: 2px solid #000000;
        }
        #content1 {
            width: 425px;
            float: left;
            height: 350px;
            background-color: #FFCC66;
            border-radius: 25px;
            margin-right: 0;
            text-align: center;
            line-height: 300px;
            padding: 20px;
            box-sizing: border-box;
            margin: 12px ;
            border: 2px solid #000000;
        }
        #content2 {
            width: 425px;
            float: right;
            height: 350px;
            background-color: #CC99FF;
            border-radius: 25px;
            text-align: center;
            line-height: 300px;
            padding: 20px;
            box-sizing: border-box;
            margin: 12px ;
            border: 2px solid #000000;
        }
    </style>
</head>
<body>
<div id="wrapper">
    <div id="header">This is header</div>
    <div id="menu">This is menu</div>
    <div id="content1">Content 1</div>
    <div id="content2">Content 2</div>
</div>
</body>
</html>
